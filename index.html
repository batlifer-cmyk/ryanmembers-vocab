<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>라이언멤버스 영어입담비법서 어휘학습기</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; padding: 1.5rem 1rem 3rem; }
  .app { max-width: 660px; margin: 0 auto; }
  .header { display: flex; align-items: center; gap: 14px; margin-bottom: 2rem; }
  .logo { width: 42px; height: 42px; background: #1a2a4a; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo svg { width: 22px; height: 22px; }
  .title-block h1 { font-size: 17px; font-weight: 600; color: #1a1a18; letter-spacing: -0.2px; }
  .title-block p { font-size: 12px; color: #888780; margin-top: 2px; }
  .tab-row { display: flex; gap: 6px; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #e5e3dc; flex-wrap: wrap; }
  .tab-btn { font-size: 13px; padding: 6px 16px; border: 1px solid #d3d1c7; border-radius: 20px; background: #fff; color: #888780; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .tab-btn.active { background: #1a2a4a; color: #c9a84c; border-color: #1a2a4a; font-weight: 500; }
  .tab-btn:hover:not(.active) { background: #f1efe8; color: #1a1a18; }
  .book-group { margin-bottom: 1.5rem; }
  .book-header { font-size: 12px; font-weight: 600; color: #c9a84c; background: #1a2a4a; display: inline-block; padding: 3px 10px; border-radius: 4px; margin-bottom: 10px; }
  .topic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 7px; }
  .topic-card { padding: 10px 12px; border: 1px solid #d3d1c7; border-radius: 9px; cursor: pointer; transition: all 0.15s; background: #fff; }
  .topic-card:hover { border-color: #888780; background: #faf9f6; }
  .topic-card.selected { border-color: #1a2a4a; background: #edf1f8; }
  .topic-card .tc-type { font-size: 10px; color: #888780; margin-bottom: 3px; }
  .topic-card .tc-name { font-size: 13px; color: #1a1a18; font-weight: 500; line-height: 1.3; }
  .topic-card .tc-count { font-size: 11px; color: #b4b2a9; margin-top: 4px; }
  .topic-card.selected .tc-name { color: #1a2a4a; }
  .select-actions { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
  .sel-btn { font-size: 12px; padding: 5px 12px; border: 1px solid #d3d1c7; border-radius: 6px; background: #fff; color: #5f5e5a; cursor: pointer; }
  .sel-btn:hover { background: #f1efe8; }
  .start-footer { position: sticky; bottom: 0; background: #f5f4f0; border-top: 1px solid #e5e3dc; padding: 1rem 0 0; display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; }
  .sel-info { font-size: 13px; color: #888780; }
  .sel-info strong { color: #1a1a18; font-weight: 600; }
  .study-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
  .home-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; padding: 5px 13px; border: 1px solid #d3d1c7; border-radius: 20px; background: #fff; color: #5f5e5a; cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
  .home-btn:hover { background: #f1efe8; color: #1a1a18; border-color: #888780; }
  .home-btn svg { width: 12px; height: 12px; }
  .progress-wrap { flex: 1; }
  .prog-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .prog-left { font-size: 12px; color: #5f5e5a; }
  .prog-right { display: flex; gap: 6px; align-items: center; }
  .score-pill { font-size: 11px; padding: 2px 9px; border-radius: 12px; background: #edf1f8; color: #1a2a4a; font-weight: 600; border: 1px solid #c5d0e8; }
  .wrong-pill { font-size: 11px; padding: 2px 9px; border-radius: 12px; background: #fcebeb; color: #A32D2D; font-weight: 600; border: 1px solid #f0a0a0; }
  .progress-bar { height: 5px; background: #e5e3dc; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: #1a2a4a; border-radius: 3px; transition: width 0.4s ease; }
  .flashcard { background: #fff; border: 1px solid #d3d1c7; border-radius: 16px; padding: 0; min-height: 230px; display: flex; flex-direction: column; align-items: stretch; cursor: pointer; position: relative; transition: border-color 0.15s, box-shadow 0.15s; user-select: none; overflow: hidden; }
  .flashcard:hover { border-color: #9a9894; box-shadow: 0 3px 14px rgba(26,42,74,0.08); }
  .flashcard:active { transform: scale(0.998); }
  .fc-book-tag { position: absolute; top: 13px; right: 14px; font-size: 10px; padding: 3px 9px; border-radius: 20px; background: #1a2a4a; color: #c9a84c; font-weight: 600; z-index: 2; }
  .fc-type-tag { position: absolute; top: 13px; left: 14px; font-size: 10px; padding: 3px 9px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.7); background: rgba(255,255,255,0.85); color: #5f5e5a; z-index: 2; }
  .fc-topic-tag { position: absolute; bottom: 13px; left: 14px; font-size: 10px; color: #b4b2a9; z-index: 2; }

  /* IMAGE ZONE */
  .fc-img-wrap { width: 100%; height: 200px; overflow: hidden; position: relative; flex-shrink: 0; background: #e8e6df; }
  .fc-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity 0.4s; }
  .fc-img-wrap .img-loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #edebd6; }
  .fc-img-wrap .img-loading svg { width: 28px; height: 28px; opacity: 0.3; animation: spin 1.4s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* FRONT CONTENT */
  .fc-front { display: flex; flex-direction: column; align-items: center; padding: 1.25rem 1.5rem 1.5rem; text-align: center; }
  .fc-front-word { font-size: 26px; font-weight: 700; color: #1a1a18; margin-bottom: 4px; letter-spacing: -0.5px; line-height: 1.2; }
  .fc-front-hint { font-size: 12px; color: #b4b2a9; margin-bottom: 2px; }
  .fc-tap-hint { font-size: 11px; color: #c9c7bf; margin-top: 10px; }

  /* BACK CONTENT */
  .fc-back-meaning { font-size: 20px; font-weight: 600; color: #1a2a4a; margin-bottom: 12px; line-height: 1.4; }
  .fc-back-example { font-size: 14px; color: #5f5e5a; line-height: 1.9; max-width: 420px; }
  .fc-back-example .hl { font-weight: 700; color: #1a2a4a; border-bottom: 2px solid #1a2a4a; padding: 0 1px; }
  .flashcard.flipped .fc-front { display: none; }
  .flashcard.flipped .fc-back { display: flex; flex-direction: column; align-items: center; padding: 1.5rem 1.75rem; text-align: center; }
  .fc-back { display: none; flex-direction: column; align-items: center; padding: 1.5rem 1.75rem; text-align: center; }
  .blank-card { background: #fff; border: 1px solid #d3d1c7; border-radius: 16px; padding: 1.75rem; }
  .bc-meta { font-size: 11px; color: #b4b2a9; margin-bottom: 12px; }
  .bc-meaning { font-size: 14px; color: #5f5e5a; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #eee; }
  .bc-meaning strong { color: #1a2a4a; }
  .bc-sentence { font-size: 17px; line-height: 2; color: #1a1a18; margin-bottom: 1rem; }
  .bc-blank { font-weight: 700; color: #1a2a4a; border-bottom: 3px solid #1a2a4a; padding: 0 6px; letter-spacing: 2px; }
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .choice-btn { font-size: 13px; padding: 10px 14px; border: 1px solid #d3d1c7; border-radius: 9px; background: #fff; color: #1a1a18; cursor: pointer; transition: all 0.15s; text-align: left; line-height: 1.35; }
  .choice-btn:hover:not(.correct):not(.wrong):not(.disabled) { background: #f1efe8; border-color: #888780; }
  .choice-btn.correct { background: #eaf3de; border-color: #639922; color: #2b5a0a; font-weight: 500; }
  .choice-btn.wrong { background: #fcebeb; border-color: #E24B4A; color: #8a1f1f; }
  .choice-btn.disabled { opacity: 0.5; cursor: default; }
  .result-msg { font-size: 14px; margin-top: 12px; min-height: 20px; font-weight: 500; padding: 8px 12px; border-radius: 8px; }
  .result-msg.ok { color: #2b5a0a; background: #eaf3de; }
  .result-msg.ng { color: #8a1f1f; background: #fcebeb; }
  .btn-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 1.25rem; }
  .btn { font-size: 14px; padding: 9px 20px; border: 1px solid #d3d1c7; border-radius: 9px; background: #fff; color: #1a1a18; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
  .btn:hover { background: #f1efe8; }
  .btn:active { transform: scale(0.97); }
  .btn.primary { background: #1a2a4a; color: #c9a84c; border-color: #1a2a4a; font-weight: 500; }
  .btn.primary:hover { background: #243d6b; }
  .btn.success { background: #eaf3de; color: #2b5a0a; border-color: #8bbf52; font-weight: 500; }
  .btn.danger { background: #fcebeb; color: #8a1f1f; border-color: #e87070; font-weight: 500; }
  .btn.ghost { color: #888780; border-color: #e0ded7; }
  .btn.ghost:hover { color: #1a1a18; background: #f1efe8; }
  .btn svg { width: 14px; height: 14px; flex-shrink: 0; }
  .result-card { background: #fff; border: 1px solid #d3d1c7; border-radius: 16px; padding: 2.5rem 1.75rem; text-align: center; }
  .result-score { font-size: 44px; font-weight: 700; color: #1a2a4a; letter-spacing: -1px; }
  .result-pct { font-size: 14px; color: #888780; margin-top: 6px; margin-bottom: 6px; }
  .result-msg-big { font-size: 16px; color: #1a1a18; font-weight: 500; margin-bottom: 2rem; }
  .result-stats { display: flex; gap: 12px; justify-content: center; margin-bottom: 2rem; flex-wrap: wrap; }
  .stat-box { background: #f5f4f0; border-radius: 10px; padding: 12px 20px; text-align: center; min-width: 90px; }
  .stat-num { font-size: 22px; font-weight: 700; color: #1a1a18; }
  .stat-num.green { color: #2b5a0a; }
  .stat-num.red { color: #8a1f1f; }
  .stat-label { font-size: 11px; color: #888780; margin-top: 3px; }
  .result-btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .tts-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; padding: 5px 12px; border: 1px solid #d3d1c7; border-radius: 20px; background: #fff; color: #5f5e5a; cursor: pointer; transition: all 0.15s; margin-top: 10px; }
  .tts-btn:hover { background: #edf1f8; border-color: #1a2a4a; color: #1a2a4a; }
  .tts-btn.speaking { background: #1a2a4a; color: #c9a84c; border-color: #1a2a4a; }
  .tts-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
  .tts-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 2px; }
  .review-banner { background: #fcebeb; border: 1px solid #e87070; border-radius: 9px; padding: 10px 16px; font-size: 13px; color: #8a1f1f; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; font-weight: 500; }
  .confirm-overlay { position: fixed; inset: 0; background: rgba(26,26,24,0.45); display: flex; align-items: center; justify-content: center; z-index: 999; }
  .confirm-box { background: #fff; border-radius: 16px; padding: 2rem 1.75rem; max-width: 300px; width: 90%; text-align: center; border: 1px solid #d3d1c7; }
  .confirm-box p { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: #1a1a18; }
  .confirm-box small { font-size: 13px; color: #888780; display: block; margin-bottom: 1.5rem; }
  .confirm-btns { display: flex; gap: 8px; justify-content: center; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 22 22" fill="none"><path d="M11 2L3 6v10l8 4 8-4V6L11 2z" stroke="#c9a84c" stroke-width="1.5" stroke-linejoin="round"/><path d="M11 2v20M3 6l8 4 8-4" stroke="#c9a84c" stroke-width="1.5" stroke-linejoin="round"/></svg>
    </div>
    <div class="title-block">
      <h1>라이언멤버스 어휘학습기</h1>
      <p>영어입담비법서 1권 · 2권 · 3권 완전판</p>
    </div>
  </div>

  <div id="home-view">
    <div class="tab-row">
      <button class="tab-btn active" onclick="setMode('flash',this)">플래시카드</button>
      <button class="tab-btn" onclick="setMode('blank',this)">예문 빈칸 맞히기</button>
    </div>
    <div class="select-actions">
      <button class="sel-btn" onclick="selectAll()">전체 선택</button>
      <button class="sel-btn" onclick="selectNone()">선택 해제</button>
      <button class="sel-btn" onclick="selectBook(1)">1권만</button>
      <button class="sel-btn" onclick="selectBook(2)">2권만</button>
      <button class="sel-btn" onclick="selectBook(3)">3권만</button>
    </div>
    <div id="topic-list"></div>
    <div class="start-footer">
      <span class="sel-info" id="selected-info">토픽을 선택하세요</span>
      <button class="btn primary" onclick="startStudy(false)">학습 시작 →</button>
    </div>
  </div>

  <div id="study-view" style="display:none;">
    <div class="study-nav">
      <button class="home-btn" onclick="confirmHome()">
        <svg viewBox="0 0 16 16" fill="none"><path d="M2 6.5L8 2l6 4.5V14H10v-3H6v3H2V6.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
        홈으로
      </button>
      <div class="progress-wrap">
        <div class="prog-top">
          <span class="prog-left" id="prog-label">0 / 0</span>
          <div class="prog-right">
            <span class="score-pill" id="score-pill">맞음 0</span>
            <span class="wrong-pill" id="wrong-pill">틀림 0</span>
          </div>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
      </div>
    </div>
    <div id="review-banner" style="display:none;" class="review-banner">
      <svg viewBox="0 0 16 16" width="16" height="16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.2"/><path d="M8 5v4M8 11v.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      틀린 문제 복습 모드 — 집중해서 다시 도전!
    </div>
    <div id="card-area"></div>
    <div class="btn-row" id="btn-row"></div>
  </div>

  <div id="result-view" style="display:none;"></div>
</div>

<script>
// w=단어, m=한국어뜻, e=예문(___포함), ef=예문에 실제 들어가는 형태, t=타입(v/i/p), img=unsplash 검색 키워드
const VOCAB = [
  { book:1, topic:"날씨 · Weather", type:"단어·숙어", words:[
    {w:"drizzle",m:"이슬비 / 보슬보슬 내리다",e:"It started to ___ as we left the restaurant.",ef:"drizzle",t:"v",img:"light rain drizzle street"},

    {w:"muggy",m:"후덥지근한",e:"Summer in Busan is really hot and ___.",ef:"muggy",t:"v",img:"hot humid summer heat"},
    {w:"scorching",m:"태울 듯이 더운",e:"It was a ___ day — over 38 degrees.",ef:"scorching",t:"v",img:"scorching hot desert sun"},
    {w:"scattered showers",m:"간간이 내리는 소나기",e:"The forecast says ___ in the afternoon.",ef:"scattered showers",t:"v",img:"rain shower umbrella"},
    {w:"torrential rain",m:"폭우, 억수같이 내리는 비",e:"The roads flooded because of ___.",ef:"torrential rain",t:"v",img:"torrential rain flood road"},
    {w:"damp",m:"축축한, 눅눅한",e:"The basement is cold and ___.",ef:"damp",t:"v",img:"damp wet basement wall"},
    {w:"blustery",m:"바람이 매우 거센",e:"It's a cold and ___ day outside.",ef:"blustery",t:"v",img:"strong wind blustery weather"},
    {w:"gale",m:"강풍",e:"A ___ warning has been issued for the coast.",ef:"gale",t:"v",img:"gale force wind storm coast"},
    {w:"it's raining cats and dogs",m:"비가 세차게 퍼붓다",e:"Don't go out now — ___!",ef:"it's raining cats and dogs",t:"i",img:"heavy pouring rain storm"},
    {w:"every cloud has a silver lining",m:"나쁜 일 뒤엔 좋은 일이 온다",e:"I failed, but I learned a lot. ___.",ef:"every cloud has a silver lining",t:"i",img:"sunlight breaking through clouds"},
    {w:"calm before the storm",m:"폭풍 전의 고요",e:"Everything seemed fine — it was just the ___.",ef:"calm before the storm",t:"i",img:"calm ocean before storm"},
    {w:"come rain or shine",m:"무슨 일이 있어도",e:"I'll be at your side ___.",ef:"come rain or shine",t:"i",img:"loyal friends together outdoors"},
    {w:"save it for a rainy day",m:"미래를 위해 아껴두다",e:"Don't spend it all — ___.",ef:"save it for a rainy day",t:"i",img:"savings piggy bank money"},
  ]},
  { book:1, topic:"계절 · Seasons", type:"단어·숙어", words:[
    {w:"blossom",m:"꽃이 피다 / 꽃",e:"Cherry trees ___ beautifully in spring.",ef:"blossom",t:"v",img:"cherry blossom spring flowers"},
    {w:"rejuvenating",m:"활기를 되찾게 하는",e:"A morning walk is really ___ in spring.",ef:"rejuvenating",t:"v",img:"morning walk nature fresh spring"},
    {w:"vibrant",m:"활기찬, 생기가 넘치는",e:"The market was ___ with color and energy.",ef:"vibrant",t:"v",img:"vibrant colorful market festival"},
    {w:"heatwave",m:"열파, 폭염",e:"The country suffered a terrible ___ in August.",ef:"heatwave",t:"v",img:"heatwave hot summer city"},
    {w:"wind chill",m:"체감 추위, 칼바람",e:"The ___ makes it feel 10 degrees colder.",ef:"wind chill",t:"v",img:"cold winter wind chill"},
    {w:"autumn leaves",m:"단풍",e:"The ___ in the mountains were absolutely stunning.",ef:"autumn leaves",t:"v",img:"autumn leaves fall foliage"},
    {w:"high season",m:"성수기",e:"Hotel prices triple during ___.",ef:"high season",t:"v",img:"busy tourist summer beach"},
    {w:"winter sports",m:"겨울 스포츠",e:"I love ___ — especially skiing and snowboarding.",ef:"winter sports",t:"v",img:"skiing snowboarding winter sports"},
    {w:"harvest",m:"수확, 수확하다",e:"Farmers have a big ___ every autumn.",ef:"harvest",t:"v",img:"harvest farm autumn crops"},
    {w:"ladybug",m:"무당벌레",e:"I found a ___ on my sleeve this morning.",ef:"ladybug",t:"v",img:"ladybug insect leaf"},
    {w:"fragrance",m:"향기",e:"The ___ of flowers filled the whole garden.",ef:"fragrance",t:"v",img:"flower fragrance garden perfume"},

    {w:"spring fever",m:"춘곤증",e:"I have bad ___ — I can't stop yawning.",ef:"spring fever",t:"v",img:"sleepy yawning spring tired"},

    {w:"every cloud has a silver lining",m:"나쁜 일 뒤엔 좋은 일이",e:"It rained on our picnic, but ___.",ef:"every cloud has a silver lining",t:"i",img:"rainbow after rain hope"},
  ]},
  { book:1, topic:"음식 · Food & Taste", type:"단어·숙어", words:[
    {w:"savory",m:"짭짤한, 고소한",e:"I prefer ___ snacks to sweet ones.",ef:"savory",t:"v",img:"savory food snacks appetizer"},
    {w:"pungent",m:"톡 쏘는 듯한",e:"This cheese has a really ___ smell.",ef:"pungent",t:"v",img:"strong cheese pungent smell"},
    {w:"bland",m:"밋밋한, 싱거운",e:"The soup was too ___ — I added some hot sauce.",ef:"bland",t:"v",img:"plain bland soup bowl"},
    {w:"nutritious",m:"영양가가 높은",e:"This salad is very ___ and filling.",ef:"nutritious",t:"v",img:"healthy nutritious salad vegetables"},

    {w:"inner beauty",m:"내면의 아름다움",e:"___ matters far more than appearance.",ef:"Inner beauty",t:"v",img:"inner beauty kindness heart"},
    {w:"perception of beauty",m:"아름다움에 대한 인식",e:"Is ___ shaped more by culture or nature?",ef:"perception of beauty",t:"v",img:"beauty perception culture diverse"},
    {w:"related to success",m:"성공과 연관되어 있는",e:"Do you think physical appearance is related to ___?",ef:"success",t:"v",img:"success career achievement confident"},
  ]},
  { book:3, topic:"자동차 · Cars & Driving", type:"단어·숙어", words:[
    {w:"road rage",m:"난폭 운전 (분노 운전)",e:"___ is becoming more common on city roads.",ef:"Road rage",t:"v",img:"road rage angry driver traffic"},
    {w:"traffic jam",m:"교통 체증",e:"I was stuck in a ___ for two hours this morning.",ef:"traffic jam",t:"v",img:"traffic jam congestion cars highway"},
    {w:"designated driver",m:"지정 운전자",e:"Can you be the ___ tonight?",ef:"designated driver",t:"v",img:"designated driver sober night out"},
    {w:"drunk driving",m:"음주 운전",e:"___ is a serious crime.",ef:"Drunk driving",t:"v",img:"drunk driving danger alcohol car"},
    {w:"speeding ticket",m:"과속 딱지",e:"I got a ___ last week.",ef:"speeding ticket",t:"v",img:"speeding ticket police fine"},
    {w:"fuel efficiency",m:"연비",e:"This car has excellent ___.",ef:"fuel efficiency",t:"v",img:"fuel efficiency car economy"},
    {w:"electric vehicle",m:"전기차",e:"More people are switching to ___s.",ef:"electric vehicle",t:"v",img:"electric vehicle EV charging"},
    {w:"parallel parking",m:"평행 주차",e:"___ in tight spaces is really stressful.",ef:"Parallel parking",t:"v",img:"parallel parking street tight"},
    {w:"backseat driver",m:"뒤에서 잔소리하는 사람",e:"Stop being a ___ — I know what I'm doing!",ef:"backseat driver",t:"i",img:"backseat passenger nagging advice"},
    {w:"hit the road",m:"출발하다",e:"Let's ___ before the traffic gets bad.",ef:"hit the road",t:"i",img:"hit the road driving departure"},
    {w:"in the driver's seat",m:"주도권을 가지고 있다",e:"In this negotiation, we're ___.",ef:"in the driver's seat",t:"i",img:"driver seat control leadership"},
    {w:"road hog",m:"차선을 독차지하는 운전자",e:"That ___ has been blocking two lanes for miles.",ef:"road hog",t:"v",img:"lane hogger bad driver"},
  ]},
  { book:3, topic:"쇼핑 · Shopping (3권)", type:"단어·숙어", words:[
    {w:"window shopping",m:"아이쇼핑",e:"I'm just doing ___ — not buying anything today.",ef:"window shopping",t:"v",img:"window shopping store display"},
    {w:"bargain",m:"싸게 산 물건 / 흥정하다",e:"I got a great ___ at the flea market.",ef:"bargain",t:"v",img:"bargain flea market deal find"},
    {w:"second-hand",m:"중고의",e:"I bought a ___ guitar in great condition.",ef:"second-hand",t:"v",img:"second hand thrift vintage guitar"},
    {w:"brand name",m:"브랜드명, 명품",e:"Do you prefer ___ items or cheaper alternatives?",ef:"brand name",t:"v",img:"brand luxury designer logo"},
    {w:"online shopping",m:"온라인 쇼핑",e:"___ is much more convenient than going to stores.",ef:"Online shopping",t:"v",img:"online shopping cart phone laptop"},
    {w:"return policy",m:"환불 정책",e:"Always check the ___ before you buy.",ef:"return policy",t:"v",img:"return policy refund exchange"},
    {w:"discount voucher",m:"할인 쿠폰",e:"I used a ___ and saved 20%.",ef:"discount voucher",t:"v",img:"coupon discount voucher savings"},
    {w:"fitting room",m:"탈의실",e:"Can I use the ___ to try this on?",ef:"fitting room",t:"v",img:"fitting room dressing room clothes"},
    {w:"on a tight budget",m:"예산이 빡빡한",e:"I'm ___ this month, so no big purchases.",ef:"on a tight budget",t:"i",img:"tight budget saving frugal money"},
    {w:"treat yourself",m:"자신에게 선물하다",e:"You deserve it — go ahead and ___!",ef:"treat yourself",t:"i",img:"treat yourself reward indulge"},
  ]},
];
let mode='flash', selectedTopics=new Set(), studyCards=[], currentIdx=0, correctCount=0, wrongIndices=[], answered=false, isReviewMode=false;

function setMode(m,btn){mode=m;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}

function renderTopicList(){
  const c=document.getElementById('topic-list');c.innerHTML='';
  [1,2,3].forEach(n=>{
    const g=document.createElement('div');g.className='book-group';
    g.innerHTML=`<div class="book-header">${n}권</div>`;
    const gr=document.createElement('div');gr.className='topic-grid';
    VOCAB.forEach((t,i)=>{
      if(t.book!==n)return;
      const card=document.createElement('div');
      card.className='topic-card'+(selectedTopics.has(i)?' selected':'');
      card.innerHTML=`<div class="tc-type">${t.type}</div><div class="tc-name">${t.topic}</div><div class="tc-count">${t.words.length}개</div>`;
      card.onclick=()=>toggleTopic(i,card);gr.appendChild(card);
    });
    g.appendChild(gr);c.appendChild(g);
  });updateInfo();
}

function toggleTopic(i,el){if(selectedTopics.has(i)){selectedTopics.delete(i);el.classList.remove('selected');}else{selectedTopics.add(i);el.classList.add('selected');}updateInfo();}
function selectAll(){VOCAB.forEach((_,i)=>selectedTopics.add(i));renderTopicList();}
function selectNone(){selectedTopics.clear();renderTopicList();}
function selectBook(n){selectedTopics.clear();VOCAB.forEach((t,i)=>{if(t.book===n)selectedTopics.add(i);});renderTopicList();}

function updateInfo(){
  const total=[...selectedTopics].reduce((s,i)=>s+VOCAB[i].words.length,0);
  const el=document.getElementById('selected-info');
  el.innerHTML=selectedTopics.size===0?'토픽을 선택하세요':`<strong>${selectedTopics.size}</strong>개 토픽 · <strong>${total}</strong>개 단어`;
}

function startStudy(reviewOnly){
  isReviewMode=reviewOnly;
  if(reviewOnly){studyCards=wrongIndices.map(i=>studyCards[i]);wrongIndices=[];}
  else{
    if(selectedTopics.size===0){alert('토픽을 하나 이상 선택하세요!');return;}
    studyCards=[];
    selectedTopics.forEach(i=>VOCAB[i].words.forEach(w=>studyCards.push({...w,topicLabel:VOCAB[i].topic,bookLabel:VOCAB[i].book})));
    studyCards=studyCards.sort(()=>Math.random()-0.5);wrongIndices=[];
  }
  currentIdx=0;correctCount=0;answered=false;
  document.getElementById('home-view').style.display='none';
  document.getElementById('result-view').style.display='none';
  document.getElementById('study-view').style.display='block';
  document.getElementById('review-banner').style.display=isReviewMode?'flex':'none';
  renderCard();
}

function confirmHome(){
  const ov=document.createElement('div');ov.className='confirm-overlay';
  ov.innerHTML=`<div class="confirm-box"><p>학습을 중단할까요?</p><small>진행 상황은 저장되지 않아요.</small><div class="confirm-btns"><button class="btn ghost" onclick="this.closest('.confirm-overlay').remove()">계속 학습</button><button class="btn danger" onclick="goHome()">홈으로</button></div></div>`;
  document.body.appendChild(ov);
}

function goHome(){
  document.querySelectorAll('.confirm-overlay').forEach(e=>e.remove());
  window.speechSynthesis&&window.speechSynthesis.cancel();
  ['study-view','result-view'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('home-view').style.display='block';
}

function renderCard(){
  if(currentIdx>=studyCards.length){showResult();return;}
  const card=studyCards[currentIdx];
  const pct=Math.round((currentIdx/studyCards.length)*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-label').textContent=(currentIdx+1)+' / '+studyCards.length;
  document.getElementById('score-pill').textContent='맞음 '+correctCount;
  document.getElementById('wrong-pill').textContent='틀림 '+wrongIndices.length;
  answered=false;
  window.speechSynthesis&&window.speechSynthesis.cancel();
  if(mode==='flash')renderFlashCard(card);else renderBlankCard(card);
}

function typeLabel(t){return t==='i'?'숙어':t==='p'?'표현':'단어';}

function exWithHighlight(card){return card.e.replace(/___/g,`<span class="hl">${card.ef}</span>`);}

function spkSVG(){return`<svg viewBox="0 0 16 16" fill="none"><path d="M3 6H1v4h2l4 3V3L3 6z" fill="currentColor"/><path d="M11 5.5a4 4 0 010 5M13 3.5a7 7 0 010 9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>`;}

function speak(text,btnId){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  document.querySelectorAll('.tts-btn.speaking').forEach(b=>b.classList.remove('speaking'));
  const btn=btnId?document.getElementById(btnId):null;
  const utt=new SpeechSynthesisUtterance(text);
  utt.lang='en-US';utt.rate=0.88;utt.pitch=1;
  const vs=window.speechSynthesis.getVoices();
  const v=vs.find(v=>v.lang==='en-US'&&/samantha|alex|zira|david|google us english/i.test(v.name))||vs.find(v=>v.lang==='en-US')||vs.find(v=>v.lang.startsWith('en'));
  if(v)utt.voice=v;
  if(btn)btn.classList.add('speaking');
  utt.onend=()=>{if(btn)btn.classList.remove('speaking');};
  utt.onerror=()=>{if(btn)btn.classList.remove('speaking');};
  window.speechSynthesis.speak(utt);
}

function exFull(card){return card.e.replace(/___/g,card.ef);}

function esc(s){return s.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/'/g,"\\'");}

function getImgUrl(card) {
  // Use custom img keyword if provided, otherwise fall back to word
  const kw = (card.img || card.w).replace(/['"]/g,'').replace(/\s+/g,',');
  // Use picsum for abstract/idiom types, unsplash source for concrete words
  return `https://source.unsplash.com/600x400/?${encodeURIComponent(kw)}`;
}

function renderFlashCard(card){
  const area=document.getElementById('card-area');
  const imgUrl = getImgUrl(card);
  const spinnerSVG = `<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#1a2a4a" stroke-width="2" stroke-dasharray="31" stroke-dashoffset="10"/></svg>`;
  area.innerHTML=`
    <div class="flashcard" id="fc" onclick="flipCard()">
      <div class="fc-book-tag">${card.bookLabel}권</div>
      <div class="fc-type-tag">${typeLabel(card.t)}</div>
      <div class="fc-img-wrap" id="fc-img-wrap">
        <div class="img-loading" id="img-loading">${spinnerSVG}</div>
        <img id="fc-img" src="${imgUrl}" alt="${card.w}"
          onload="this.style.opacity=1;document.getElementById('img-loading').style.display='none';"
          onerror="document.getElementById('fc-img-wrap').style.display='none';"
          style="opacity:0;">
      </div>
      <div class="fc-front">
        <div class="fc-front-word">${card.w}</div>
        <div class="fc-front-hint">${card.topicLabel}</div>
        <div class="tts-row" onclick="event.stopPropagation()">
          <button class="tts-btn" id="tts-w" onclick="speak('${esc(card.w)}','tts-w')">${spkSVG()} 단어 듣기</button>
        </div>
        <div class="fc-tap-hint">탭해서 뜻 확인 →</div>
      </div>
      <div class="fc-back">
        <div class="fc-back-meaning">${card.m}</div>
        <div class="fc-back-example">${exWithHighlight(card)}</div>
        <div class="tts-row" onclick="event.stopPropagation()">
          <button class="tts-btn" id="tts-wb" onclick="speak('${esc(card.w)}','tts-wb')">${spkSVG()} 단어</button>
          <button class="tts-btn" id="tts-ex" onclick="speak(\`${esc(exFull(card))}\`,'tts-ex')">${spkSVG()} 예문</button>
        </div>
      </div>
      <div class="fc-topic-tag">${card.topicLabel}</div>
    </div>`;
  document.getElementById('btn-row').innerHTML=`
    <button class="btn ghost" onclick="goBack()" ${currentIdx===0?'disabled style="opacity:0.35"':''}>
      <svg viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>이전
    </button>
    <button class="btn danger" onclick="markCard(false)">모름</button>
    <button class="btn ghost" onclick="flipCard()">뒤집기</button>
    <button class="btn success" onclick="markCard(true)">알아요!</button>`;
}

function flipCard(){const fc=document.getElementById('fc');if(fc)fc.classList.toggle('flipped');}

function markCard(knew){if(knew)correctCount++;else wrongIndices.push(currentIdx);currentIdx++;renderCard();}

function goBack(){if(currentIdx===0)return;currentIdx--;renderCard();}

function renderBlankCard(card){
  const area=document.getElementById('card-area');
  const pool=studyCards.map(c=>c.w).filter(w=>w!==card.w);
  const choices=[...pool.sort(()=>Math.random()-0.5).slice(0,3),card.w].sort(()=>Math.random()-0.5);
  const exDisp=card.e.replace(/___/g,'<span class="bc-blank">________</span>');
  // Use data-val attribute to safely store any string (avoids apostrophe/quote injection bugs)
  const btnHtml=choices.map((c,i)=>{
    const safe=c.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `<button class="choice-btn" data-val="${safe}" data-idx="${i}">${c}</button>`;
  }).join('');
  area.innerHTML=`
    <div class="blank-card">
      <div class="bc-meta">${card.bookLabel}권 · ${card.topicLabel} · ${typeLabel(card.t)}</div>
      <div class="bc-meaning">뜻: <strong>${card.m}</strong></div>
      <div class="bc-sentence">${exDisp}</div>
      <div onclick="event.stopPropagation()" style="margin-bottom:12px;">
        <button class="tts-btn" id="tts-bex" onclick="speak(\`${esc(exFull(card))}\`,'tts-bex')">${spkSVG()} 예문 듣기</button>
      </div>
      <div class="choices" id="choices-wrap">${btnHtml}</div>
      <div class="result-msg" id="result-msg"></div>
    </div>`;
  // Attach click handlers via JS (safe for any string content)
  document.querySelectorAll('#choices-wrap .choice-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>checkAnswer(btn, btn.getAttribute('data-val')));
  });
  document.getElementById('btn-row').innerHTML=`
    <button class="btn ghost" onclick="goBack()" ${currentIdx===0?'disabled style="opacity:0.35"':''}>
      <svg viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>이전
    </button>
    <button class="btn ghost" onclick="skipCard()">다음</button>`;
}

function checkAnswer(btn,choice){
  if(answered)return;answered=true;
  const card=studyCards[currentIdx];
  const ok=(choice===card.w);
  btn.classList.add(ok?'correct':'wrong');
  document.querySelectorAll('.choice-btn').forEach(b=>b.classList.add('disabled'));
  const msg=document.getElementById('result-msg');
  if(ok){
    correctCount++;msg.textContent='정답! 잘했어요 +1점';msg.className='result-msg ok';
    setTimeout(()=>{currentIdx++;renderCard();},950);
  }else{
    wrongIndices.push(currentIdx);
    msg.textContent='틀렸어요. 정답: '+card.w;msg.className='result-msg ng';
    document.querySelectorAll('.choice-btn').forEach(b=>{
      if(b.getAttribute('data-val')===card.w) b.classList.add('correct');
    });
    document.getElementById('btn-row').innerHTML=`
      <button class="btn ghost" onclick="goBack()">
        <svg viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>이전
      </button>
      <button class="btn primary" onclick="nextCard()">다음 →</button>`;
  }
}

function skipCard(){wrongIndices.push(currentIdx);currentIdx++;renderCard();}
function nextCard(){currentIdx++;renderCard();}

function showResult(){
  document.getElementById('study-view').style.display='none';
  const rv=document.getElementById('result-view');rv.style.display='block';
  const total=studyCards.length,pct=Math.round((correctCount/total)*100);
  const emoji=pct>=90?'🏆':pct>=70?'👍':pct>=50?'📖':'💪';
  const msg=pct>=90?'완벽해요! 이 토픽은 마스터!':pct>=70?'잘하셨어요! 조금만 더 연습하면 완벽해요.':pct>=50?'절반 이상 맞혔어요! 다시 한 번 도전해봐요.':'틈틈이 복습이 필요해요. 다시 도전!';
  const reviewBtn=wrongIndices.length>0?`<button class="btn danger" onclick="startStudy(true)">틀린 ${wrongIndices.length}개 다시 보기</button>`:'';
  rv.innerHTML=`
    <div class="result-card">
      <div class="result-score">${correctCount} / ${total}</div>
      <div class="result-pct">${pct}% 정답률</div>
      <div class="result-msg-big">${emoji} ${msg}</div>
      <div class="result-stats">
        <div class="stat-box"><div class="stat-num green">${correctCount}</div><div class="stat-label">정답</div></div>
        <div class="stat-box"><div class="stat-num red">${wrongIndices.length}</div><div class="stat-label">오답</div></div>
        <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-label">전체</div></div>
      </div>
      <div class="result-btns">
        <button class="btn ghost" onclick="goHome()">홈으로</button>
        <button class="btn" onclick="startStudy(false)">다시 학습</button>
        ${reviewBtn}
      </div>
    </div>`;
}

renderTopicList();
if(window.speechSynthesis){window.speechSynthesis.getVoices();window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();}
</script>
</body>
</html>
