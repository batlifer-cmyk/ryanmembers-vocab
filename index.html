<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>라이언멤버스 영어입담비법서 어휘학습기 v2</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; padding: 1.5rem 1rem 3rem; }
  .app { max-width: 660px; margin: 0 auto; }

  /* HEADER */
  .header { display: flex; align-items: center; gap: 14px; margin-bottom: 2rem; }
  .logo { width: 42px; height: 42px; background: #1a2a4a; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo svg { width: 22px; height: 22px; }
  .title-block h1 { font-size: 17px; font-weight: 600; color: #1a1a18; letter-spacing: -0.2px; }
  .title-block p { font-size: 12px; color: #888780; margin-top: 2px; }

  /* TABS */
  .tab-row { display: flex; gap: 6px; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #e5e3dc; flex-wrap: wrap; }
  .tab-btn { font-size: 13px; padding: 6px 16px; border: 1px solid #d3d1c7; border-radius: 20px; background: #fff; color: #888780; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .tab-btn.active { background: #1a2a4a; color: #c9a84c; border-color: #1a2a4a; font-weight: 500; }
  .tab-btn:hover:not(.active) { background: #f1efe8; color: #1a1a18; }

  /* TOPIC GRID */
  .section-label { font-size: 11px; font-weight: 600; color: #b4b2a9; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 10px; margin-top: 1.5rem; }
  .section-label:first-child { margin-top: 0; }
  .book-group { margin-bottom: 1.5rem; }
  .book-header { font-size: 12px; font-weight: 600; color: #c9a84c; background: #1a2a4a; display: inline-block; padding: 3px 10px; border-radius: 4px; margin-bottom: 10px; }
  .topic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 7px; }
  .topic-card { padding: 10px 12px; border: 1px solid #d3d1c7; border-radius: 9px; cursor: pointer; transition: all 0.15s; background: #fff; }
  .topic-card:hover { border-color: #888780; background: #faf9f6; }
  .topic-card.selected { border-color: #1a2a4a; background: #edf1f8; }
  .topic-card .tc-type { font-size: 10px; color: #888780; margin-bottom: 3px; }
  .topic-card .tc-name { font-size: 13px; color: #1a1a18; font-weight: 500; line-height: 1.3; }
  .topic-card .tc-count { font-size: 11px; color: #b4b2a9; margin-top: 4px; }
  .topic-card.selected .tc-name { color: #1a2a4a; }

  /* SELECT ALL ROW */
  .select-actions { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
  .sel-btn { font-size: 12px; padding: 5px 12px; border: 1px solid #d3d1c7; border-radius: 6px; background: #fff; color: #5f5e5a; cursor: pointer; }
  .sel-btn:hover { background: #f1efe8; }

  /* START FOOTER */
  .start-footer { position: sticky; bottom: 0; background: #f5f4f0; border-top: 1px solid #e5e3dc; padding: 1rem 0 0; display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; }
  .sel-info { font-size: 13px; color: #888780; }
  .sel-info strong { color: #1a1a18; font-weight: 600; }

  /* PROGRESS */
  .progress-wrap { margin-bottom: 1.25rem; }
  .prog-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .prog-left { font-size: 13px; color: #5f5e5a; }
  .prog-right { display: flex; gap: 8px; align-items: center; }
  .score-pill { font-size: 12px; padding: 2px 10px; border-radius: 12px; background: #edf1f8; color: #1a2a4a; font-weight: 600; border: 1px solid #c5d0e8; }
  .wrong-pill { font-size: 12px; padding: 2px 10px; border-radius: 12px; background: #fcebeb; color: #A32D2D; font-weight: 600; border: 1px solid #f0a0a0; }
  .progress-bar { height: 5px; background: #e5e3dc; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: #1a2a4a; border-radius: 3px; transition: width 0.4s ease; }

  /* CARD AREA */
  .card-wrap { margin-bottom: 1.25rem; }

  /* FLASHCARD */
  .flashcard { background: #fff; border: 1px solid #d3d1c7; border-radius: 16px; padding: 2.25rem 1.75rem 1.75rem; min-height: 220px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; cursor: pointer; position: relative; transition: border-color 0.15s, box-shadow 0.15s; user-select: none; }
  .flashcard:hover { border-color: #9a9894; box-shadow: 0 3px 14px rgba(26,42,74,0.08); }
  .flashcard:active { transform: scale(0.995); }
  .fc-book-tag { position: absolute; top: 13px; right: 14px; font-size: 10px; padding: 3px 9px; border-radius: 20px; background: #1a2a4a; color: #c9a84c; font-weight: 600; }
  .fc-type-tag { position: absolute; top: 13px; left: 14px; font-size: 10px; padding: 3px 9px; border-radius: 20px; border: 1px solid #d3d1c7; color: #888780; }
  .fc-topic-tag { position: absolute; bottom: 13px; left: 14px; font-size: 10px; color: #b4b2a9; }
  .fc-front-word { font-size: 30px; font-weight: 700; color: #1a1a18; margin-bottom: 8px; letter-spacing: -0.5px; line-height: 1.2; }
  .fc-front-hint { font-size: 13px; color: #b4b2a9; }
  .fc-tap-hint { font-size: 12px; color: #c9c7bf; margin-top: 18px; }
  .fc-back-meaning { font-size: 22px; font-weight: 600; color: #1a2a4a; margin-bottom: 14px; line-height: 1.4; }
  .fc-back-example { font-size: 14px; color: #5f5e5a; line-height: 1.8; max-width: 400px; }
  .fc-back-example .blank { font-weight: 700; color: #1a2a4a; border-bottom: 2px solid #1a2a4a; padding: 0 2px; }
  .flashcard.flipped .fc-front { display: none; }
  .flashcard.flipped .fc-back { display: flex; flex-direction: column; align-items: center; }
  .fc-back { display: none; flex-direction: column; align-items: center; }

  /* BLANK CARD */
  .blank-card { background: #fff; border: 1px solid #d3d1c7; border-radius: 16px; padding: 1.75rem; }
  .bc-meta { font-size: 11px; color: #b4b2a9; margin-bottom: 14px; }
  .bc-meaning { font-size: 14px; color: #5f5e5a; margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #eee; }
  .bc-meaning strong { color: #1a2a4a; }
  .bc-sentence { font-size: 17px; line-height: 2; color: #1a1a18; margin-bottom: 1.25rem; }
  .bc-blank { font-weight: 700; color: #1a2a4a; border-bottom: 3px solid #1a2a4a; padding: 0 6px; letter-spacing: 2px; }
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .choice-btn { font-size: 13px; padding: 10px 14px; border: 1px solid #d3d1c7; border-radius: 9px; background: #fff; color: #1a1a18; cursor: pointer; transition: all 0.15s; text-align: left; line-height: 1.35; }
  .choice-btn:hover:not(.correct):not(.wrong):not(.disabled) { background: #f1efe8; border-color: #888780; }
  .choice-btn.correct { background: #eaf3de; border-color: #639922; color: #2b5a0a; font-weight: 500; }
  .choice-btn.wrong { background: #fcebeb; border-color: #E24B4A; color: #8a1f1f; }
  .choice-btn.disabled { opacity: 0.5; cursor: default; }
  .result-msg { font-size: 14px; margin-top: 14px; min-height: 20px; font-weight: 500; padding: 8px 12px; border-radius: 8px; }
  .result-msg.ok { color: #2b5a0a; background: #eaf3de; }
  .result-msg.ng { color: #8a1f1f; background: #fcebeb; }

  /* BUTTONS */
  .btn-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .btn { font-size: 14px; padding: 9px 20px; border: 1px solid #d3d1c7; border-radius: 9px; background: #fff; color: #1a1a18; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
  .btn:hover { background: #f1efe8; }
  .btn:active { transform: scale(0.97); }
  .btn.primary { background: #1a2a4a; color: #c9a84c; border-color: #1a2a4a; font-weight: 500; }
  .btn.primary:hover { background: #243d6b; }
  .btn.success { background: #eaf3de; color: #2b5a0a; border-color: #8bbf52; font-weight: 500; }
  .btn.danger { background: #fcebeb; color: #8a1f1f; border-color: #e87070; font-weight: 500; }
  .btn.ghost { color: #888780; border-color: #e0ded7; }
  .btn.ghost:hover { color: #1a1a18; background: #f1efe8; }
  .btn svg { width: 14px; height: 14px; flex-shrink: 0; }

  /* RESULT */
  .result-card { background: #fff; border: 1px solid #d3d1c7; border-radius: 16px; padding: 2.5rem 1.75rem; text-align: center; }
  .result-score { font-size: 44px; font-weight: 700; color: #1a2a4a; letter-spacing: -1px; }
  .result-pct { font-size: 14px; color: #888780; margin-top: 6px; margin-bottom: 6px; }
  .result-msg-big { font-size: 16px; color: #1a1a18; font-weight: 500; margin-bottom: 2rem; }
  .result-stats { display: flex; gap: 12px; justify-content: center; margin-bottom: 2rem; flex-wrap: wrap; }
  .stat-box { background: #f5f4f0; border-radius: 10px; padding: 12px 20px; text-align: center; min-width: 90px; }
  .stat-num { font-size: 22px; font-weight: 700; color: #1a1a18; }
  .stat-num.green { color: #2b5a0a; }
  .stat-num.red { color: #8a1f1f; }
  .stat-label { font-size: 11px; color: #888780; margin-top: 3px; }
  .result-btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }

  /* DIVIDER */
  hr { border: none; border-top: 1px solid #e5e3dc; margin: 1.5rem 0; }

  /* REVIEW MODE BANNER */
  .review-banner { background: #fcebeb; border: 1px solid #e87070; border-radius: 9px; padding: 10px 16px; font-size: 13px; color: #8a1f1f; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; font-weight: 500; }
</style>
</head>

<div class="app">

  <div class="header">

  <div id="home-view">
    <div class="tab-row">
      <button class="tab-btn active" onclick="setMode('flash', this)">플래시카드</button>
      <button class="tab-btn" onclick="setMode('blank', this)">예문 빈칸 맞히기</button>
    </div>

    <div class="select-actions">

      <button class="sel-btn" onclick="selectNone()">선택 해제</button>

    <div id="topic-list"></div>

    <div class="start-footer">

      <button class="btn primary" onclick="startStudy(false)">학습 시작 →</button>
    </div>
  </div>

  <!-- STUDY VIEW -->

    <div class="progress-wrap">

        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div id="review-banner" style="display:none;" class="review-banner">
      <svg viewBox="0 0 16 16" width="16" height="16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.2"/><path d="M8 5v4M8 11v.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      틀린 문제 복습 모드 — 집중해서 다시 도전!
    </div>
    <div class="card-wrap" id="card-area"></div>
    <div class="btn-row" id="btn-row"></div>
  </div>

  <!-- RESULT VIEW -->
  <div id="result-view" style="display:none;"></div>

</div>

let mode = 'flash';
let selectedTopics = new Set();
let studyCards = [];
let currentIdx = 0;
let correctCount = 0;
let wrongIndices = [];
let answered = false;
let isReviewMode = false;

function setMode(m, btn) {
  mode = m;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function renderTopicList() {
  const container = document.getElementById('topic-list');
  container.innerHTML = '';
  [1, 2, 3].forEach(bookNum => {
    const group = document.createElement('div');
    group.className = 'book-group';
    group.innerHTML = `<div class="book-header">${bookNum}권</div>`;
    const grid = document.createElement('div');
    grid.className = 'topic-grid';
    VOCAB.forEach((t, i) => {
      if (t.book !== bookNum) return;
      const card = document.createElement('div');
      card.className = 'topic-card' + (selectedTopics.has(i) ? ' selected' : '');
      card.innerHTML = `<div class="tc-type">${t.type}</div><div class="tc-name">${t.topic}</div><div class="tc-count">${t.words.length}개</div>`;
      card.onclick = () => toggleTopic(i, card);
      grid.appendChild(card);
    });
    group.appendChild(grid);
    container.appendChild(group);
  });
  updateInfo();
}

function toggleTopic(i, el) {
  if (selectedTopics.has(i)) { selectedTopics.delete(i); el.classList.remove('selected'); }
  else { selectedTopics.add(i); el.classList.add('selected'); }
  updateInfo();
}

function selectAll() {
  VOCAB.forEach((_, i) => selectedTopics.add(i));
  renderTopicList();
}
function selectNone() {
  selectedTopics.clear();
  renderTopicList();
}
function selectBook(n) {
  selectedTopics.clear();
  VOCAB.forEach((t, i) => { if (t.book === n) selectedTopics.add(i); });
  renderTopicList();
}

function updateInfo() {
  const total = [...selectedTopics].reduce((s, i) => s + VOCAB[i].words.length, 0);
  const el = document.getElementById('selected-info');
  if (selectedTopics.size === 0) el.innerHTML = '토픽을 선택하세요';
  else el.innerHTML = `<strong>${selectedTopics.size}</strong>개 토픽 · <strong>${total}</strong>개 단어`;
}

function startStudy(reviewOnly) {
  isReviewMode = reviewOnly;
  if (reviewOnly) {
    studyCards = wrongIndices.map(i => studyCards[i]);
    wrongIndices = [];
  } else {
    if (selectedTopics.size === 0) { alert('토픽을 하나 이상 선택하세요!'); return; }
    studyCards = [];
    selectedTopics.forEach(i => {
      VOCAB[i].words.forEach(w => studyCards.push({ ...w, topicLabel: VOCAB[i].topic, bookLabel: VOCAB[i].book }));
    });
    studyCards = studyCards.sort(() => Math.random() - 0.5);
    wrongIndices = [];
  }
  currentIdx = 0; correctCount = 0; answered = false;
  document.getElementById('home-view').style.display = 'none';
  document.getElementById('result-view').style.display = 'none';
  document.getElementById('study-view').style.display = 'block';
  document.getElementById('review-banner').style.display = isReviewMode ? 'flex' : 'none';
  renderCard();
}

function renderCard() {
  if (currentIdx >= studyCards.length) { showResult(); return; }
  const card = studyCards[currentIdx];
  const pct = Math.round((currentIdx / studyCards.length) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = (currentIdx + 1) + ' / ' + studyCards.length;
  document.getElementById('score-pill').textContent = '맞음 ' + correctCount;
  document.getElementById('wrong-pill').textContent = '틀림 ' + wrongIndices.length;
  answered = false;
  if (mode === 'flash') renderFlashCard(card);
  else renderBlankCard(card);
}

function typeLabel(t) {
  return t === 'i' ? '숙어' : t === 'p' ? '표현' : '단어';
}

function renderFlashCard(card) {
  const area = document.getElementById('card-area');
  const exDisplay = card.e.replace(/___/g, '<span class="blank">______</span>');
  area.innerHTML = `
    <div class="flashcard" id="fc" onclick="flipCard()">
      <div class="fc-book-tag">${card.bookLabel}권</div>
      <div class="fc-type-tag">${typeLabel(card.t)}</div>
      <div class="fc-front">
        <div class="fc-front-word">${card.w}</div>
        <div class="fc-front-hint">${card.topicLabel}</div>
        <div class="fc-tap-hint">탭해서 뜻 확인 →</div>
      </div>
      <div class="fc-back">
        <div class="fc-back-meaning">${card.m}</div>
        <div class="fc-back-example">${exDisplay}</div>
      </div>
      <div class="fc-topic-tag">${card.topicLabel}</div>
    </div>`;
  document.getElementById('btn-row').innerHTML = `
    <button class="btn ghost" onclick="goBack()" ${currentIdx === 0 ? 'disabled style="opacity:0.35"' : ''}>
      <svg viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      이전
    </button>
    <button class="btn danger" onclick="markCard(false)">모름</button>
    <button class="btn ghost" onclick="flipCard()">뒤집기</button>
    <button class="btn success" onclick="markCard(true)">알아요!</button>`;
}

function flipCard() {
  const fc = document.getElementById('fc');
  if (!fc) return;
  fc.classList.toggle('flipped');
}

function markCard(knew) {
  if (knew) correctCount++;
  else wrongIndices.push(currentIdx);
  currentIdx++;
  renderCard();
}

function goBack() {
  if (currentIdx === 0) return;
  currentIdx--;
  renderCard();
}

function renderBlankCard(card) {
  const area = document.getElementById('card-area');
  const allWords = studyCards.map(c => c.w);
  const pool = allWords.filter(w => w !== card.w);
  const distractors = pool.sort(() => Math.random() - 0.5).slice(0, 3);
  const choices = [...distractors, card.w].sort(() => Math.random() - 0.5);
  const exDisplay = card.e.replace(/___/g, `<span class="bc-blank">________</span>`);
  const btnHtml = choices.map(c =>
    `<button class="choice-btn" onclick="checkAnswer(this,'${c.replace(/'/g,"&#39;").replace(/"/g,"&quot;")}')">${c}</button>`
  ).join('');
  area.innerHTML = `
    <div class="blank-card">
      <div class="bc-meta">${card.bookLabel}권 · ${card.topicLabel} · ${typeLabel(card.t)}</div>
      <div class="bc-meaning">뜻: <strong>${card.m}</strong></div>
      <div class="bc-sentence">${exDisplay}</div>
      <div class="choices">${btnHtml}</div>
      <div class="result-msg" id="result-msg"></div>
    </div>`;
  document.getElementById('btn-row').innerHTML = `
    <button class="btn ghost" onclick="goBack()" ${currentIdx === 0 ? 'disabled style="opacity:0.35"' : ''}>
      <svg viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      이전
    </button>
    <button class="btn ghost" onclick="skipCard()">건너뛰기</button>`;
}

function checkAnswer(btn, choice) {
  if (answered) return;
  answered = true;
  const card = studyCards[currentIdx];
  const isCorrect = (choice === card.w);
  btn.classList.add(isCorrect ? 'correct' : 'wrong');
  document.querySelectorAll('.choice-btn').forEach(b => b.classList.add('disabled'));
  const msg = document.getElementById('result-msg');
  if (isCorrect) {
    correctCount++;
    msg.textContent = '정답! 잘했어요 +1점';
    msg.className = 'result-msg ok';
    setTimeout(() => { currentIdx++; renderCard(); }, 950);
  } else {
    wrongIndices.push(currentIdx);
    msg.textContent = '틀렸어요. 정답: ' + card.w;
    msg.className = 'result-msg ng';
    document.querySelectorAll('.choice-btn').forEach(b => { if (b.textContent === card.w) b.classList.add('correct'); });
    document.getElementById('btn-row').innerHTML = `
      <button class="btn ghost" onclick="goBack()">
        <svg viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        이전
      </button>
      <button class="btn primary" onclick="nextCard()">다음 →</button>`;
  }
}

function skipCard() { wrongIndices.push(currentIdx); currentIdx++; renderCard(); }
function nextCard() { currentIdx++; renderCard(); }

function showResult() {
  document.getElementById('study-view').style.display = 'none';
  const rv = document.getElementById('result-view');
  rv.style.display = 'block';
  const total = studyCards.length;
  const pct = Math.round((correctCount / total) * 100);
  let emoji = pct >= 90 ? '🏆' : pct >= 70 ? '👍' : pct >= 50 ? '📖' : '💪';
  let msg = pct >= 90 ? '완벽해요! 이 토픽은 마스터!' : pct >= 70 ? '잘하셨어요! 조금만 더 연습하면 완벽해요.' : pct >= 50 ? '절반 이상 맞혔어요! 다시 한 번 도전해봐요.' : '틈틈이 복습이 필요해요. 다시 도전!';
  const reviewBtn = wrongIndices.length > 0
    ? `<button class="btn danger" onclick="startStudy(true)">틀린 ${wrongIndices.length}개 다시 보기</button>`
    : '';
  rv.innerHTML = `
    <div class="result-card">
      <div class="result-score">${correctCount} / ${total}</div>
      <div class="result-pct">${pct}% 정답률</div>
      <div class="result-msg-big">${emoji} ${msg}</div>
      <div class="result-stats">
        <div class="stat-box"><div class="stat-num green">${correctCount}</div><div class="stat-label">정답</div></div>
        <div class="stat-box"><div class="stat-num red">${wrongIndices.length}</div><div class="stat-label">오답</div></div>
        <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-label">전체</div></div>
      </div>
      <div class="result-btns">
        <button class="btn ghost" onclick="backToHome()">토픽 선택</button>
        <button class="btn" onclick="startStudy(false)">다시 학습</button>
        ${reviewBtn}
      </div>
    </div>`;
}

function backToHome() {
  document.getElementById('result-view').style.display = 'none';
  document.getElementById('home-view').style.display = 'block';
}

renderTopicList();
</script>
